name: Weekly Trivy CVE Auto-Fix

on:
  schedule:
    - cron: '40 3 * * 1'
  workflow_dispatch:

jobs:
  trivy-autofix:
    runs-on: [self-hosted, linux, x64, pop-os]
    permissions:
      contents: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: json
          output: trivy-results.json
          exit-code: 0
          ignore-unfixed: true

      - name: Check for CVEs
        id: check
        run: |
          COUNT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('trivy-results.json'))
              total = sum(len(r.get('Vulnerabilities') or []) for r in data.get('Results', []) if r.get('Type') in ['npm','pnpm','node-pkg'])
              print(total)
          except: print(0)
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "CVEs found: $COUNT"

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.count != '0'
        with:
          version: 10.30.3

      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH

      - name: Enable pnpm via corepack
        run: corepack enable pnpm
        if: steps.check.outputs.count != '0'

      - name: Auto-fix CVEs in pnpm.overrides
        if: steps.check.outputs.count != '0'
        run: |
          python3 -c "
          import json
          data = json.load(open('trivy-results.json'))
          pkg = json.load(open('package.json'))
          overrides = pkg.setdefault('pnpm', {}).setdefault('overrides', {})
          for result in data.get('Results', []):
              if result.get('Type') not in ['npm', 'pnpm', 'node-pkg']:
                  continue
              for vuln in result.get('Vulnerabilities') or []:
                  fixed = vuln.get('FixedVersion', '')
                  name = vuln.get('PkgName', '')
                  sev = vuln.get('Severity', '')
                  if name and fixed and sev in ['HIGH', 'CRITICAL']:
                      overrides[name] = f'>={fixed}'
                      print(f'Patched: {name} >= {fixed}')
          with open('package.json', 'w') as f:
              json.dump(pkg, f, indent=2, ensure_ascii=False)
              f.write(chr(10))
          "

      - name: Create Pull Request
        if: steps.check.outputs.count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix(security): auto-patch CVEs via pnpm.overrides'
          branch: fix/trivy-cve-auto-${{ github.run_number }}
          title: 'fix(security): auto-patch ${{ steps.check.outputs.count }} HIGH/CRITICAL CVEs'
          labels: security,dependencies,automated
          body: |
            ## Auto-generated CVE fix

            Trivy detected **${{ steps.check.outputs.count }}** HIGH/CRITICAL CVEs.
            This PR adds `pnpm.overrides` to pin patched versions.

            **Verify after merge:** `trivy fs . --severity HIGH,CRITICAL`
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && ICON="✅" || ICON="🚨"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${ICON} nadavai | trivy-autofix: ${STATUS} | $(date +'%d/%m %H:%M')" \
            > /dev/null 2>&1 || true
