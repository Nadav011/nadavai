# Template rendered by deploy-self-healing.py per repo variant.
name: Self-Healing CI
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: self-healing-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 15
    steps:
      - name: Skip bot commits
        if: |
          startsWith(github.event.workflow_run.head_branch, 'claude-auto-fix-ci-') ||
          github.event.workflow_run.actor.login == 'github-actions[bot]'
        run: |
          echo "Skipping bot-initiated run"
          exit 0

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check daily budget
        run: bash ~/.claude/scripts/ci-budget-check.sh
        env:
          SELF_HEALING_DAILY_BUDGET: "5.00"

      - name: Fetch failure logs
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed 2>/dev/null | tail -500 > /tmp/failure-logs.txt || echo "No logs available" > /tmp/failure-logs.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create fix branch
        run: |
          BRANCH="claude-auto-fix-ci-${{ github.event.workflow_run.id }}"
          git checkout -b "$BRANCH"

      - uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-6
          max_turns: 10
          # Repo-specific allowlist rendered from project-variants.json.
          allowed_tools: "Edit,Read,Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm test),Bash(pnpm run build),Bash(git status),Bash(git diff --stat),Bash(bash ~/.claude/scripts/ci-templates/commit-self-healing.sh)"
          prompt: |
            Fix THIS concrete CI failure. Rules:
            - NEVER downgrade dependencies
            - NEVER touch migrations or RLS policies
            - NEVER modify more than 3 files
            - NEVER use shell globs or command wildcards
            - Commit with 'fix(ci): ' prefix
            - Use ~/.claude/scripts/ci-templates/commit-self-healing.sh for commit and staging

            Error logs:
            $(cat /tmp/failure-logs.txt)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Log result
        if: always()
        run: |
          COST="${{ steps.claude.outputs.cost_usd || '0.00' }}"
          STATUS="${{ job.status }}"
          echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"repo\":\"${{ github.repository }}\",\"run_id\":\"${{ github.event.workflow_run.id }}\",\"status\":\"$STATUS\",\"cost_usd\":$COST}" >> ~/.config/agents/logs/self-healing.jsonl

      - name: Push fix branch
        if: success()
        run: |
          if git diff --quiet HEAD~1 HEAD 2>/dev/null; then
            echo "No changes committed"
            exit 0
          fi
          git push origin HEAD

      - name: Open draft PR
        if: success()
        run: |
          if git diff --quiet HEAD~1 HEAD 2>/dev/null; then exit 0; fi
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          DEFAULT=$(gh api "repos/${{ github.repository }}" --jq '.default_branch')
          gh pr create --draft \
            --title "fix(ci): auto-fix failure ${{ github.event.workflow_run.id }}" \
            --body "Auto-fix for CI failure in workflow run ${{ github.event.workflow_run.id }}.

          **Shadow mode** — this is a draft PR. Review before merging.

          Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" \
            --base "$DEFAULT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram
        if: success()
        uses: appleboy/telegram-action@847a2d3240d33a6137191cc89b3ad7f53e427c06
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Self-Healing* `${{ github.repository }}`
            Status: ${{ job.status }}
            [View PR](${{ github.server_url }}/${{ github.repository }}/pulls)
