name: CI

on:
  push:
    branches: [main, master, feat/*, fix/*]
    paths-ignore: ["**.md"]
  pull_request:
    branches: [main, master]
    paths-ignore: ["**.md"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: Nadav011/ci-standards/.github/workflows/ci-nextjs.yml@main
    secrets: inherit
    with:
      node-version: "24"
      package-manager: pnpm

  notify:
    needs: ci
    if: always() && needs.ci.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram on failure
        run: |
          MSG="🚨 nadavai CI FAILED! Branch=${{ github.ref_name }} Actor=${{ github.actor }}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" > /dev/null 2>&1 || true
