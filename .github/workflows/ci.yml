name: CI

on:
  push:
    branches: [main, feat/*, fix/*]
    paths-ignore: ["**.md"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: Nadav011/ci-standards/.github/workflows/ci-nextjs.yml@main
    with:
      node-version: "24"
      package-manager: pnpm@10.30.3
    secrets: inherit
