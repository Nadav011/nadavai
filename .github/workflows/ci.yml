name: CI

on:
  push:
    branches: [main, feat/*, fix/*]
    paths-ignore: ["**.md"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: Nadav011/ci-standards/.github/workflows/ci-nextjs.yml@main
    with:
      node-version: "24"
      package-manager: pnpm
    secrets: inherit

      - name: Notify Telegram on failure
        if: failure()
        run: |
          MSG="🚨 nadavai CI FAILED! Branch=${{{{ github.ref_name }}}} Actor=${{{{ github.actor }}}}"
          curl -s "https://api.telegram.org/bot${{{{ secrets.TELEGRAM_BOT_TOKEN }}}}/sendMessage" \
            -d chat_id="${{{{ secrets.TELEGRAM_CHAT_ID }}}}" \
            -d "text=$MSG" > /dev/null 2>&1 || true
