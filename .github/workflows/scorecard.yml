name: OpenSSF Scorecard

on:
  schedule:
    - cron: "17 9 * * 1"
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
        continue-on-error: true
      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🏆 OpenSSF Scorecard FAILED | ${{ github.repository }} | ${{ github.ref_name }}" \
            > /dev/null 2>&1 || true
