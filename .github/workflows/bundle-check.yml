name: Bundle Size Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: Bundle Size Guard
    runs-on: [self-hosted, linux, x64, pop-os]
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - run: ppnpm install --no-frozen-lockfile

      - name: Build
        run: ppnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Check total bundle size
        run: |
          TOTAL=$(find .next/static -name "*.js" -exec du -k {} + | awk '{sum+=$1} END{print sum}')
          echo "Bundle: ${TOTAL} KB"
          if [ "${TOTAL}" -gt 1200 ]; then
            echo "FAILED: ${TOTAL} KB > 1200 KB limit"
            exit 1
          fi
          echo "PASSED: ${TOTAL} KB"
