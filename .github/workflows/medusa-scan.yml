name: Medusa Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: medusa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  medusa-scan:
    name: Medusa AI Security Scan
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install medusa-security
        run: pip install medusa-security --quiet

      - name: Run Medusa scan
        run: |
          medusa scan . \
            --fail-on high \
            --format json \
            --output medusa-report \
            -e node_modules/ \
            -e .next/ \
            -e dist/ \
            -e build/ \
            -e coverage/ \
            -e .dart_tool/ \
            -e .flutter-plugins

      - name: Upload Medusa report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: medusa-report-${{ github.sha }}
          path: medusa-report/
          retention-days: 14