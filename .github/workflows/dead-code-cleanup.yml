name: dead-code-cleanup
on:
  schedule:
    - cron: "40 5 * * 1"
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: [self-hosted, linux, x64, pop-os]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { version: "10" }
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH

      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
      - name: Knip unused file PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx knip --reporter json > /tmp/knip.json 2>/dev/null || true
          FILE=$(python3 -c "
          import json,sys
          try:
              d=json.load(open("/tmp/knip.json"))
              files=d.get("files",[])
              safe=[f for f in files if not any(x in f for x in [".test.",".spec.",".stories.",".generated.","d.ts"])]
              print(safe[0]) if safe else sys.exit(1)
          except: sys.exit(1)
          " 2>/dev/null) || { echo "None"; exit 0; }
          BRANCH="chore/remove-unused-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          rm "$FILE"
          pnpm run typecheck || { git checkout main; exit 1; }
          git add -A && git commit -m "chore: remove unused $FILE"
          git push origin "$BRANCH"
          gh pr create --title "chore: remove unused $(basename $FILE)" --body "Detected by Knip" --base main --head "$BRANCH"
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && ICON="✅" || ICON="🚨"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${ICON} nadavai | dead-code-cleanup: ${STATUS} | $(date +'%d/%m %H:%M')" \
            > /dev/null 2>&1 || true
