name: Accessibility

on:
  push:
    branches: [main, master]
    paths-ignore: ["**.md"]
  pull_request:
    branches: [main, master]
    paths-ignore: ["**.md"]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  accessibility:
    name: WCAG Accessibility Audit
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>/dev/null || npm ci

      - name: Build
        run: pnpm run build 2>/dev/null || npm run build 2>/dev/null || true
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Start preview server
        run: |
          npx serve@14 dist -l 3000 &>/dev/null &
          npx wait-on@8 http://localhost:3000 --timeout 30000 || \
          (npx serve@14 .next -l 3000 &>/dev/null & npx wait-on@8 http://localhost:3000 --timeout 30000) || \
          (npx serve@14 build -l 3000 &>/dev/null & npx wait-on@8 http://localhost:3000 --timeout 30000) || true

      - name: Run axe-core accessibility scan
        id: axe-scan
        run: |
          npx @axe-core/cli@4.11.1 http://localhost:3000 --exit --tags wcag2a,wcag2aa,wcag21a,wcag21aa --reporter json > axe-results.json 2>&1 || true
          # Parse results
          if [ -f axe-results.json ]; then
            VIOLATIONS=$(python3 -c "import json; d=json.load(open('axe-results.json')); print(sum(len(r.get('violations',[])) for r in d))" 2>/dev/null || echo "?")
            PASSES=$(python3 -c "import json; d=json.load(open('axe-results.json')); print(sum(len(r.get('passes',[])) for r in d))" 2>/dev/null || echo "?")
            echo "## Accessibility Results" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Violations | $VIOLATIONS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Passes | $PASSES |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Violations: $VIOLATIONS | Passes: $PASSES"
            echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
            if [ "$VIOLATIONS" != "0" ] && [ "$VIOLATIONS" != "?" ]; then
              echo "::error::$VIOLATIONS accessibility violations found"
              exit 1
            fi
          fi

      - name: Create GitHub Issue on accessibility failure
        if: failure() && steps.axe-scan.outputs.violations != '' && steps.axe-scan.outputs.violations != '0'
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          VIOLATIONS_COUNT: ${{ steps.axe-scan.outputs.violations }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VIOLATIONS="$VIOLATIONS_COUNT"
          RUN_URL="${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}"
          BODY="$(printf '## Accessibility Violations Detected

**%s WCAG violations** found on `%s` by axe-core.

**Branch:** `%s`  
**Commit:** `%s`  
**Run:** [View full report](%s)

### What to check
- Screen reader labels (aria-label, aria-labelledby)
- Color contrast ratios (WCAG AA: 4.5:1 text, 3:1 UI)
- Keyboard navigation and focus indicators
- Alternative text for images
- Form field associations

### Next steps
1. Download the accessibility-report artifact from the failed run
2. Fix each violation in axe-results.json
3. Re-run the workflow to verify

*Auto-created by Accessibility CI workflow.*' "$VIOLATIONS" "$GH_REF_NAME" "$GH_REF_NAME" "$GH_SHA" "$RUN_URL")"
          gh issue create \
            --title "♿ Accessibility violations: ${VIOLATIONS} WCAG issues on \`${GH_REF_NAME}\`" \
            --body "$BODY" \
            --label "a11y,bug" \
            2>/dev/null || \
          gh issue create \
            --title "♿ Accessibility violations: ${VIOLATIONS} WCAG issues on \`${GH_REF_NAME}\`" \
            --body "$BODY" \
            --label "bug" \
            2>/dev/null || true

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: accessibility-report-${{ github.sha }}
          path: axe-results.json
          retention-days: 30

      - name: Notify Telegram
        if: failure()
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=♿ A11y audit FAILED | ${GH_REPOSITORY} | ${GH_REF_NAME}" \
            > /dev/null 2>&1 || true