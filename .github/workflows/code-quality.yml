name: Code Quality Gates
# Universal code quality gates template.
# Runs TypeCheck, Lint, Tests, Coverage, Dead Code (knip), Type Coverage.
# Designed to run in parallel after install.
#
# REQUIRED — fill in before copying to project:
#   PACKAGE_MANAGER:      pnpm              # pnpm | npm
#   PROJECT_NAME:         my-project        # for Telegram
#   MAIN_BRANCH:          main              # main | master
#   TEST_CMD:             pnpm vitest run --maxWorkers=2 --reporter=verbose
#   COVERAGE_CMD:         pnpm vitest run --coverage --coverage.provider=v8 --maxWorkers=1
#   TYPECHECK_CMD:        pnpm run typecheck
#   LINT_CMD:             pnpm run lint
#   LOCKFILE:             pnpm-lock.yaml    # pnpm-lock.yaml | package-lock.json
#   COVERAGE_THRESHOLD:   70                # minimum % for lines/functions/branches
#
# OPTIONAL:
#   knip (dead-code):     weekly only — heavy scan, not per-PR
#   type-coverage:        requires `type-coverage` package installed
#   mutation testing:     see templates/mutation-testing.yml (heavy — on-demand only)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  schedule:
    - cron: '0 7 * * 1'        # Monday 7AM — dead-code scan
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  CI: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # ── Install once ──────────────────────────────────────────────────────────────
  install:
    name: Install
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm                # PLACEHOLDER: remove for npm projects
      - run: pnpm install --frozen-lockfile      # PLACEHOLDER: npm ci for npm projects
      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}  # PLACEHOLDER: LOCKFILE

  # ── TypeCheck ──────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeCheck
    needs: install
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}  # PLACEHOLDER: LOCKFILE
      - name: Install if cache miss
        run: '[ -d node_modules ] || pnpm install --frozen-lockfile'
      - name: TypeScript check
        run: pnpm run typecheck                  # PLACEHOLDER: TYPECHECK_CMD
      - name: Type coverage (≥90%)
        run: npx type-coverage@2.29.7 --at-least 90 --detail --strict
        continue-on-error: true                  # Warn — tighten to exit 1 when at ≥90% baseline

  # ── Lint ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    needs: install
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}  # PLACEHOLDER: LOCKFILE
      - name: Install if cache miss
        run: '[ -d node_modules ] || pnpm install --frozen-lockfile'
      - name: Lint
        run: pnpm exec eslint .

  # ── ESLint auto-fix (push to main only) ───────────────────────────────────
  eslint-autofix:
    name: ESLint Auto-Fix
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'  # PLACEHOLDER: MAIN_BRANCH
    needs: install
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}  # PLACEHOLDER: LOCKFILE
      - name: Install if cache miss
        run: '[ -d node_modules ] || pnpm install --frozen-lockfile'
      - name: Run ESLint --fix
        run: pnpm exec eslint . --fix 2>&1 || true
      - name: Run ESLint gate (verify fixed)
        run: pnpm exec eslint . || echo "::warning::Some issues remain after autofix — manual review needed"
        continue-on-error: true
      - name: Commit autofix if changes present
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: eslint auto-fix"
          file_pattern: "app/**/*.ts app/**/*.tsx components/**/*.ts components/**/*.tsx lib/**/*.ts lib/**/*.tsx"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  # ── Tests + Coverage ──────────────────────────────────────────────────────────
  test:
    name: Tests
    needs: install
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}  # PLACEHOLDER: LOCKFILE
      - name: Install if cache miss
        run: '[ -d node_modules ] || pnpm install --frozen-lockfile'
      - name: Run tests
        run: pnpm run test
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  coverage:
    name: Coverage Report
    needs: test
    if: always()
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}  # PLACEHOLDER: LOCKFILE
      - name: Install if cache miss
        run: '[ -d node_modules ] || pnpm install --frozen-lockfile'
      - name: Generate coverage (single worker — prevents OOM)
        run: pnpm run test:coverage
        # PLACEHOLDER: COVERAGE_CMD
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const d = require('./coverage/coverage-summary.json').total;
              const threshold = 70; // PLACEHOLDER: COVERAGE_THRESHOLD
              let failed = false;
              ['statements','branches','functions','lines'].forEach(m => {
                const p = d[m].pct;
                const icon = p >= 95 ? '✅' : p >= 85 ? '🟡' : p >= threshold ? '🔵' : '❌';
                const status = p < threshold ? ' (BELOW THRESHOLD)' : '';
                console.log(icon + ' ' + m + ': ' + p + '%' + status);
                if (p < threshold) failed = true;
              });
              if (failed) { console.log('Coverage below threshold!'); process.exit(1); }
            "
          else
            echo "No coverage report found"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Dead code detection (weekly only — heavy scan) ────────────────────────────
  dead-code:
    name: Dead Code (knip)
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run knip (dead code scan)
        run: npx knip@5.87.0 --reporter compact
        continue-on-error: true                  # Warn — fix manually after reviewing output
      - name: Upload knip report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: knip-dead-code
          path: knip-results.json
          retention-days: 14

  # ── Circular Dependencies (madge) ──────────────────────────────────────────────
  circular-deps:
    name: Circular Dependencies
    needs: install
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 5
    if: github.event_name != 'schedule'
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install if cache miss
        run: '[ -d node_modules ] || pnpm install --frozen-lockfile'
      - name: Check for circular dependencies
        run: |
          npx madge@8.0.0 --circular --extensions ts,tsx src/ > /tmp/madge-output.txt 2>&1
          if grep -q "Found [1-9]" /tmp/madge-output.txt; then
            cat /tmp/madge-output.txt
            echo "::warning::Circular dependencies detected"
          else
            echo "No circular dependencies found"
          fi
        continue-on-error: true

  # ── Quality gate ──────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: [self-hosted, linux, x64, pop-os]
    if: always()
    needs: [typecheck, lint, test, coverage]
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - name: Evaluate quality results
        run: |
          echo "## Code Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          [ "${{ needs.typecheck.result }}" != "success" ] && FAILED=1 && echo "❌ typecheck failed"
          [ "${{ needs.lint.result }}"      != "success" ] && FAILED=1 && echo "❌ lint failed"
          [ "${{ needs.test.result }}"      != "success" ] && FAILED=1 && echo "❌ tests failed"
          [ "${{ needs.coverage.result }}"  != "success" ] && FAILED=1 && echo "❌ coverage below threshold"
          [ $FAILED -eq 0 ] && echo "✅ Quality gate passed" && exit 0
          echo "❌ Quality gate FAILED" && exit 1

      - name: Notify Telegram on failure
        if: failure()
        run: |
          MSG="🔴 *Quality Gate FAILED: my-project*%0A%0ABranch: \`${{ github.ref_name }}\`%0ABy: ${{ github.actor }}%0A%0A🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # PLACEHOLDER: PROJECT_NAME in msg above
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" -d "parse_mode=Markdown" > /dev/null 2>&1 || true
