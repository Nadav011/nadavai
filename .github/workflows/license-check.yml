name: License Check

on:
  pull_request:
    paths: ["package.json", "pnpm-lock.yaml", "package-lock.json"]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: license-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    name: License Compliance
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>/dev/null || npm ci

      - name: Check licenses (gate — blocks merge on non-OSS)
        id: license-gate
        run: |
          echo "## License Compliance Check" >> "$GITHUB_STEP_SUMMARY"
          echo "Checking for GPL-3.0, AGPL-3.0, SSPL-1.0, EUPL-1.1..." >> "$GITHUB_STEP_SUMMARY"

          # This exits 1 if any banned license is found — merge blocked
          npx license-checker-rseidelsohn@4.4.2 \
            --production \
            --failOn "GPL-3.0;AGPL-3.0;AGPL-3.0-only;GPL-3.0-only;GPL-2.0;GPL-2.0-only;SSPL-1.0;EUPL-1.1;LGPL-3.0;LGPL-3.0-only" \
            --summary
          echo "::notice::No restricted licenses found — merge allowed"

      - name: License summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Full License Summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx license-checker-rseidelsohn@4.4.2 --production --summary 2>/dev/null | head -30 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=📜 License Check FAILED | ${{ github.repository }} | ${{ github.ref_name }}" \
            > /dev/null 2>&1 || true