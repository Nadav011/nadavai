name: Mutation Testing

on:
  schedule:
    - cron: '3 4 * * 0'  # Sunday 3:23 AM (off-minute per CLAUDE.md)
  pull_request:
    paths:
      - 'src/lib/**'
      - 'src/hooks/**'
      - 'src/services/**'
      - 'src/utils/**'
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Stryker cache
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.ref_name }}-
            stryker-main-
            stryker-master-

      - name: Run mutation testing (incremental)
        run: npx stryker run --incremental
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
